name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 版本号 (不带v)
        required: true
        default: 2.3.3
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 设置 .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.x

      - name: 更新版本号
        shell: bash
        env:
          GITHUB_EVENT_INPUTS_VERSION: ${{ github.event.inputs.version }}
        run: |-
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            version="${GITHUB_EVENT_INPUTS_VERSION#v}"
          else
            version="${GITHUB_REF_NAME#refs/tags/}"
            version="${version#v}"
          fi
          echo "版本号: $version"

          sed -i "s/^\([[:space:]]*internal const string VERSION = \)\".*\";/\1\"$version\";/" fcm/Commands/Version.cs
          cat fcm/Commands/Version.cs

          sed -i "s/^\(AppVersion=\).*/\1$version/" installer.iss
          cat installer.iss

      - name: 发布
        run: dotnet publish fcm --configuration Release

      - name: 打包安装程序
        shell: bash
        run: |-
          curl -o "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl" "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          iscc installer.iss

      - name: 上传构建文件
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: Release/FunContentManager_Setup.exe

      - name: 发布至发行版
        env:
          GH_TOKEN: ${{ github.token }}
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: gh release upload "$env:GITHUB_REF_NAME" "Release/FunContentManager_Setup.exe" --clobber
